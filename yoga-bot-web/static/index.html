<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogaBot | Gyan Samvad</title>
  <meta name="description" content="YogaBot - Yoga RAG chatbot. Ask in English or Hindi." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <img src="https://bharatgen.com/wp-content/uploads/2025/04/BharatGen-Logo-2-scaled.png" alt="BharatGen" class="logo">
    </div>
    <div class="header-center">
      <span class="brand-name">YogaBot</span>
      <span class="lang-badge" id="langBadge">—</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle-btn" aria-label="Toggle theme" id="theme-toggle">
        <i data-lucide="sun" class="icon icon-sun"></i>
        <i data-lucide="moon" class="icon icon-moon"></i>
      </button>
    </div>
  </header>

  <main class="main-container">
    <section class="pane" aria-label="Chat">
      <div class="pane-header">
        <span class="pane-title">
          <i data-lucide="message-circle" class="icon"></i>
          Chat
        </span>
      </div>

      <div class="script-section">
        <label class="script-label">Select Language</label>
      </div>
      <div class="dropdown-section">
        <select class="dropdown" id="langDropdown" aria-label="Select Language">
          <option value="">Select Language...</option>
          <option value="eng">English</option>
          <option value="hin">हिंदी (Hindi)</option>
        </select>
      </div>

      <div class="chat-display-box" id="chatDisplayBox">
        <div class="chat-placeholder" id="chatPlaceholder">Namaste! नमस्ते! Select a language above to begin.</div>
        <div class="messages" id="messages"></div>
      </div>

      <div class="input-row" id="inputRow">
        <textarea class="chat-input" id="input" rows="1" placeholder="Type a message or M for menu…"></textarea>
        <button class="btn-primary" id="sendBtn" type="button">
          <i data-lucide="send" class="icon"></i>
          <span>Send</span>
        </button>
        <button class="btn-primary btn-record" id="recordBtn" type="button" title="Record voice message">
          <i data-lucide="mic" class="icon"></i>
          <span>Record</span>
        </button>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
