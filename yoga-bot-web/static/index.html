<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogaBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --surface-hover: #222228;
      --border: #2d2d35;
      --text: #e8e6e3;
      --text-muted: #9a9692;
      --accent: #7c9c6b;
      --accent-hover: #8faf7a;
      --user-msg: #2d3a2a;
      --bot-msg: #1e2228;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
      height: 85vh;
      max-height: 720px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface-hover);
    }
    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .header .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: var(--accent);
      color: var(--bg);
      border-radius: 6px;
      font-weight: 500;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg {
      max-width: 88%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg strong { font-weight: 600; }
    .msg.user {
      align-self: flex-end;
      background: var(--user-msg);
      border: 1px solid rgba(124, 156, 107, 0.3);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-msg);
      border: 1px solid var(--border);
    }
    .msg.bot .lang { font-family: 'Noto Sans Devanagari', sans-serif; }

    .product-card {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 0.5rem;
      max-width: 280px;
    }
    .product-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }
    .product-card .body {
      padding: 0.75rem 1rem;
    }
    .product-card .name { font-weight: 600; margin-bottom: 0.25rem; }
    .product-card .price { color: var(--accent); font-size: 0.95rem; }
    .product-card a {
      color: var(--accent);
      font-size: 0.9rem;
      text-decoration: none;
      margin-top: 0.5rem;
      display: inline-block;
    }
    .product-card a:hover { text-decoration: underline; }

    .input-row {
      padding: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 0.6rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      resize: none;
    }
    #input:focus {
      outline: none;
      border-color: var(--accent);
    }
    #input::placeholder { color: var(--text-muted); }

    .btn {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .lang-select {
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .lang-select p {
      margin-bottom: 1rem;
      color: var(--text-muted);
      white-space: pre-wrap;
    }
    .lang-btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .lang-btns .btn { min-width: 100px; }

    .typing { color: var(--text-muted); font-size: 0.9rem; padding: 0.5rem 0; }
    .error { color: #c95a5a; font-size: 0.9rem; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>YogaBot</h1>
      <span class="badge" id="langBadge">—</span>
    </header>

    <div class="messages" id="messages"></div>

    <div id="langSection" class="lang-select">
      <p id="langPrompt">Namaste! नमस्ते!<br><br>Choose your language:</p>
      <div class="lang-btns">
        <button class="btn btn-primary" data-lang="eng">English</button>
        <button class="btn btn-primary" data-lang="hin">हिंदी</button>
      </div>
    </div>

    <div class="input-row" id="inputRow" style="display: none;">
      <textarea id="input" rows="1" placeholder="Type a message or M for menu…"></textarea>
      <button class="btn btn-primary" id="sendBtn" type="button">Send</button>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const STORAGE_KEY = 'yogabot_client_id';

    function clientId() {
      let id = localStorage.getItem(STORAGE_KEY);
      if (!id) {
        id = 'web_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem(STORAGE_KEY, id);
      }
      return id;
    }

    function addMessage(text, who, products = null) {
      const wrap = document.getElementById('messages');
      const langSection = document.getElementById('langSection');
      const inputRow = document.getElementById('inputRow');
      if (langSection.style.display !== 'none') {
        langSection.style.display = 'none';
        inputRow.style.display = 'flex';
      }

      const div = document.createElement('div');
      div.className = 'msg ' + who;
      const content = document.createElement('div');
      content.innerHTML = escapeHtml(text).replace(/\n/g, '<br>').replace(/\*([^*]+)\*/g, '<strong>$1</strong>');
      if (who === 'bot') content.classList.add('lang');
      div.appendChild(content);

      if (products && products.length) {
        products.forEach(p => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            ${p.imageUrl ? `<img src="${escapeAttr(p.imageUrl)}" alt="${escapeAttr(p.name)}" onerror="this.style.display='none'">` : ''}
            <div class="body">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="price">₹${escapeHtml(p.price)}</div>
              ${p.link ? `<a href="${escapeAttr(p.link)}" target="_blank" rel="noopener">View</a>` : ''}
            </div>
          `;
          div.appendChild(card);
        });
      }
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function escapeHtml(s) {
      const el = document.createElement('div');
      el.textContent = s;
      return el.innerHTML;
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, '&quot;');
    }

    function setTyping(on) {
      let el = document.getElementById('typing');
      if (on && !el) {
        el = document.createElement('div');
        el.id = 'typing';
        el.className = 'typing';
        el.textContent = 'YogaBot is typing…';
        document.getElementById('messages').appendChild(el);
        document.getElementById('messages').scrollTop = 1e9;
      }
      if (el) el.style.display = on ? 'block' : 'none';
    }

    function setError(msg) {
      let el = document.getElementById('error');
      if (!el) {
        el = document.createElement('div');
        el.id = 'error';
        el.className = 'error';
        document.getElementById('messages').appendChild(el);
      }
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      const el = document.getElementById('error');
      if (el) el.style.display = 'none';
    }

    async function loadLanguageMenu() {
      try {
        const r = await fetch(API + '/api/menu');
        const d = await r.json();
        document.getElementById('langPrompt').innerHTML = escapeHtml(d.message).replace(/\n/g, '<br>');
      } catch (_) {}
    }

    async function sendMessage(text, language = null) {
      clearError();
      addMessage(text, 'user');
      setTyping(true);
      document.getElementById('sendBtn').disabled = true;

      try {
        const body = { message: text, client_id: clientId() };
        if (language) body.language = language;
        const r = await fetch(API + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));

        if (!r.ok) {
          if (r.status === 400 && data.detail) {
            const d = data.detail;
            if (d.message) {
              document.getElementById('langPrompt').innerHTML = escapeHtml(d.message).replace(/\n/g, '<br>');
              document.getElementById('langSection').style.display = 'block';
              document.getElementById('inputRow').style.display = 'none';
            }
            setError(d.message || 'Please choose a language first.');
          } else {
            setError(data.detail?.message || data.detail || 'Request failed');
          }
          return;
        }

        addMessage(data.text, 'bot', data.products || null);
        if (data.audio_base64) {
          const audio = new Audio('data:audio/wav;base64,' + data.audio_base64);
          audio.play().catch(() => {});
        }
      } catch (e) {
        setError(e.message || 'Network error');
      } finally {
        setTyping(false);
        document.getElementById('sendBtn').disabled = false;
      }
    }

    document.querySelectorAll('.lang-btns .btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.getAttribute('data-lang');
        sendMessage(lang, lang);
        document.getElementById('langBadge').textContent = lang === 'eng' ? 'EN' : 'HI';
      });
    });

    document.getElementById('sendBtn').addEventListener('click', () => {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      sendMessage(text);
    });

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('sendBtn').click();
      }
    });

    async function init() {
      await loadLanguageMenu();
      const r = await fetch(API + '/api/session/' + encodeURIComponent(clientId()));
      if (r.ok) {
        const s = await r.json();
        if (s.has_language) {
          document.getElementById('langSection').style.display = 'none';
          document.getElementById('inputRow').style.display = 'flex';
          document.getElementById('langBadge').textContent = s.language === 'eng' ? 'EN' : 'HI';
        }
      }
    }
    init();
  </script>
</body>
</html>
