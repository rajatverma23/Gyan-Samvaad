<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WhatsApp Bot</title>
    <script src="/whatsapp/socket.io/socket.io.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #ece5dd; 
            margin: 0; 
        }
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            background: white; 
            border-radius: 10px; 
            padding: 20px; 
        }
        .msg { 
            padding: 10px; 
            border-radius: 8px; 
            margin: 8px 0; 
            max-width: 80%; 
            position: relative;
        }
        .user { 
            background: #dcf8c6; 
            margin-left: auto; 
        }
        .bot { 
            background: #f1f0f0; 
        }
        .chat { 
            display: flex; 
            flex-direction: column; 
            max-height: 600px;
            overflow-y: auto;
            padding: 20px;
            background: #e5ddd5;
            border-radius: 8px;
        }
        .qr-section {
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .qr-header {
            background: #075e54;
            color: white;
            padding: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .qr-content {
            padding: 15px;
            text-align: center;
            display: none;
        }
        .qr-content.show {
            display: block;
        }
        .qr img { 
            max-width: 300px;
            margin: 0 auto;
            display: block;
        }
        .user-id {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 4px;
        }
        .timestamp {
            font-size: 0.7em;
            color: #999;
            position: absolute;
            bottom: 4px;
            right: 8px;
        }
        .toggle-icon {
            transition: transform 0.3s ease;
        }
        .toggle-icon.rotated {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
<div class="container">
    <h2>KrishiSathi WhatsApp Bot</h2>
    
    <div class="qr-section">
        <div class="qr-header" onclick="toggleQR()">
            <span>QR Code Scanner</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div class="qr-content" id="qr">
            <p>Waiting for QR code...</p>
        </div>
    </div>

    <div class="chat" id="chat"></div>
</div>

<script>
    const socket = io({ path: '/whatsapp/socket.io' });
    const qrDiv = document.getElementById('qr');
    const chatDiv = document.getElementById('chat');

    function toggleQR() {
        const qrContent = document.querySelector('.qr-content');
        const toggleIcon = document.querySelector('.toggle-icon');
        qrContent.classList.toggle('show');
        toggleIcon.classList.toggle('rotated');
    }

    function formatTimestamp(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    socket.on('qr', (qrData) => {
        qrDiv.innerHTML = `<img src="${qrData}" alt="Scan QR code with WhatsApp" />`;
        qrDiv.classList.add('show'); // Show QR code when received
    });

    socket.on('ready', () => {
        qrDiv.innerHTML = '<p>✅ KrishiSathi WhatsApp bot is ready!</p>';
    });

    socket.on('message', (data) => {
        const msg = document.createElement('div');
        msg.classList.add('msg', data.from === 'user' ? 'user' : 'bot');
        
        // Add user identification if it's a user message
        if (data.from === 'user' && data.userId) {
            const userId = document.createElement('div');
            userId.classList.add('user-id');
            userId.innerText = `User: ${data.userId.split('@')[0]}`; // Remove the @c.us part
            msg.appendChild(userId);
        }

        const content = document.createElement('div');
        content.innerText = data.text;
        msg.appendChild(content);

        // Add timestamp
        const timestamp = document.createElement('div');
        timestamp.classList.add('timestamp');
        timestamp.innerText = formatTimestamp(Date.now());
        msg.appendChild(timestamp);

        chatDiv.appendChild(msg);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    // Show QR section by default when page loads
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelector('.qr-content').classList.add('show');
    });
</script>
</body>
</html>
